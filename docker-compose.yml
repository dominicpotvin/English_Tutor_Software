name: english-tutor

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tutor
      POSTGRES_PASSWORD: tutor
      POSTGRES_DB: english_tutor
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tutor -d english_tutor"]
      interval: 5s
      timeout: 3s
      retries: 12

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://tutor:tutor@db:5432/english_tutor?sslmode=disable
      PORT: "8096"
    ports:
      - "8096:8096"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8095:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
